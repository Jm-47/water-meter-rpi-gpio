# Option B: If using the Python MQTT script, the sensor is auto-discovered.
# No sensor configuration needed — just add the utility meters below.

# Utility meters for tracking consumption over time periods
utility_meter:
  water_hourly:
    source: sensor.water_meter_total
    cycle: hourly
  water_daily:
    source: sensor.water_meter_total
    cycle: daily
  water_monthly:
    source: sensor.water_meter_total
    cycle: monthly
  water_yearly:
    source: sensor.water_meter_total
    cycle: yearly
